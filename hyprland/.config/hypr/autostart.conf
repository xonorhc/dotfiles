# Backup and sync Dropbox
exec-once = bash ~/Dropbox/tech/shell-scripts/backup-daily-dropbox.sh
exec-once = sleep 30 && dropbox

# Sync Onedrive
exec-once = sleep 60 && onedrive --sync

# Open Whatsapp on Electron
exec-once = sleep 90 && npm run start --prefix ~/whatsapp-electron/ 2>&1| tee ~/log-whatsapp-electron.txt
