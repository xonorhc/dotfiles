# : Manager [[[

[manager]
cwd = { fg = "#e4e1e9" }

# Tab
tab_active = { fg = "#242c61", bg = "#bcc3ff", bold = true }
tab_inactive = { fg = "#dfe0ff", bg = "#0d154b" }
tab_width = 1

# Find
find_keyword = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied = { fg = "#ff71ca", bg = "#ff71ca" }
marker_cut = { fg = "#ffd7f0", bg = "#ffd7f0" }
marker_marked = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#e6bad7", bg = "#e6bad7" }

# Count
count_copied = { fg = "#2d1127", bg = "#ffd7f0" }
count_cut = { fg = "#2d1127", bg = "#ffd7f0" }
count_selected = { fg = "#242c61", bg = "#e6bad7" }

# Border
border_symbol = " "
border_style  = { fg = "#bcc3ff" }

# : ]]]


# : Status [[[

[status]
separator_open = "🭁"
separator_close = "🭠"
separator_style = { bg = "#242c61", fg = "#F4A261" }

[mode]
# Mode
normal_main = { bg = "#bcc3ff", fg = "#242c61", bold = true }
normal_alt  = { bg = "#46464f", fg = "#c7c5d0" }

# Select mode
select_main = { bg = "#c4c5dd", fg = "#2d2f42", bold = true }
select_alt  = { bg = "#46464f", fg = "#c7c5d0" }

# Unset mode
unset_main = { bg = "#e6bad7", fg = "#45263d", bold = true }
unset_alt  = { bg = "#46464f", fg = "#c7c5d0" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#bcc3ff", bg = "#39393f" }
progress_error = { fg = "#ffb4ab", bg = "#39393f" }

# Permissions
permissions_t = { fg = "#6366a5" }
permissions_w = { fg = "#bd4a96" }
permissions_x = { fg = "#ff2b12" }
permissions_r = { fg = "#ff3eb7" }
permissions_s = { fg = "#464cff" }

# : ]]]


# : Select [[[

[select]
border = { fg = "#bcc3ff" }
active = { fg = "#e6bad7", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#bcc3ff" }
value = { fg = "#e4e1e9" }

# : ]]]


# : Completion [[[

[completion]
border = { fg = "#bcc3ff", bg = "#242c61" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#bcc3ff" }
title = {}
hovered = { fg = "#ffd7f0", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#39393f" }
cand = { fg = "#bcc3ff" }
rest = { fg = "#242c61" }
desc = { fg = "#e4e1e9" }
separator = " ▶ "
separator_style = { fg = "#e4e1e9" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#e4e1e9" }
run = { fg = "#e4e1e9" }
footer = { fg = "#2d2f42", bg = "#c4c5dd" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#e6bad7" }
title_warn = { fg = "#bcc3ff" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", is = "orphan", bg = "#93000a" },
    { name = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { name = "*", fg = "#e4e1e9" },
    { name = "*/", fg = "#bcc3ff" },
]

# : ]]]
